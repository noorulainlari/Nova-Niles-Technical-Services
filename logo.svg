<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(22, 65, 124);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(69, 160, 73);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Shape (Shield/Tech Theme) -->
  <path d="M150 20 L270 80 L270 200 L150 280 L30 200 L30 80 Z" fill="none" stroke="url(#grad1)" stroke-width="8"/>
  
  <!-- Inner Content (NN) -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="120" fill="url(#grad1)">NN</text>
  
  <!-- Company Name Text for Logo -->
  <text x="50%" y="85%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#333">NOVA NILES</text>
  <text x="50%" y="95%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666">TECHNICAL SERVICES</text>
</svg>