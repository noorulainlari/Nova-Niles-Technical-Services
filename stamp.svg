<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 300">
  <defs>
    <!-- Define a circular path for text -->
    <path id="circlePath" d="M 150, 150 m -100, 0 a 100,100 0 1,1 200,0 a 100,100 0 1,1 -200,0" />
    <path id="innerCirclePath" d="M 150, 150 m -70, 0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0" />
  </defs>

  <!-- Outer Ring -->
  <circle cx="150" cy="150" r="145" stroke="#102580" stroke-width="4" fill="none" />
  <circle cx="150" cy="150" r="105" stroke="#102580" stroke-width="2" fill="none" />
  
  <!-- Text on Path (Top) -->
  <text fill="#102580" font-family="Arial, sans-serif" font-weight="bold" font-size="24">
    <textPath xlink:href="#circlePath" startOffset="50%" text-anchor="middle">
      NOVA NILES TECHNICAL SERVICES
    </textPath>
  </text>
  
  <!-- Text on Path (Bottom - rotated) -->
  <text x="150" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#102580">
    DUBAI - U.A.E.
  </text>
  
  <!-- Center Content -->
  <g transform="translate(150, 150)">
    <text y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#102580">NN</text>
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#102580">AUTHORIZED</text>
    <text y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#102580">SIGNATORY</text>
    
    <!-- Star decorations -->
    <path d="M -90 -15 L -85 -5 L -75 -5 L -82 2 L -78 12 L -90 5 L -102 12 L -98 2 L -105 -5 L -95 -5 Z" fill="#102580" transform="scale(0.5)"/>
    <path d="M 90 -15 L 95 -5 L 105 -5 L 98 2 L 102 12 L 90 5 L 78 12 L 82 2 L 75 -5 L 85 -5 Z" fill="#102580" transform="scale(0.5)"/>
  </g>
</svg>